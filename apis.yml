aid: auto-owners-insurance
name: Auto-Owners Insurance
description: >-
  Auto-Owners Insurance is a mutual insurance company headquartered in Lansing,
  Michigan, offering auto, home, life, business, and farm insurance products
  through a network of independent agents. Founded in 1916, the company is
  consistently rated among the top mutual insurance companies in the United
  States. Auto-Owners provides online account management, claims filing, and
  agent portal services but does not currently offer a public developer API.
