  - type: Features
    data:
      - name: Personal Insurance
        description: >-
          Comprehensive personal lines coverage including auto, home, condo,
          renters, life, and specialty policies such as pet, flood, umbrella,
          and farm insurance.
      - name: Business Insurance
        description: >-
          Commercial insurance products including commercial auto, workers
          compensation, bonds, commercial umbrella, and loss control services
          for businesses of all sizes.
      - name: Independent Agent Network
        description: >-
          Access to a nationwide network of independent insurance agents who
          provide local, personalized expertise and policy management services.
      - name: Online Claims Filing
        description: >-
          Digital claims submission and tracking for auto, property, and other
          covered losses through the policyholder online portal.
      - name: Online Account Management
        description: >-
          Policyholder self-service portal for managing policies, making
          payments, viewing documents, and tracking claim status.
      - name: Road Trouble Assistance
        description: >-
          Roadside assistance services for auto policyholders covering towing,
          battery jump, flat tire, fuel delivery, and lockout assistance.
  - type: UseCases
    data:
      - name: Personal Auto Coverage
        description: >-
          Protecting personal vehicles with liability, collision, comprehensive,
          uninsured motorist, and medical payment coverages.
      - name: Homeowners Protection
        description: >-
          Insuring primary residences against damage, theft, liability, and
          additional living expenses with customizable coverage options.
      - name: Small Business Insurance
        description: >-
          Providing commercial insurance packages for small to mid-size businesses
          covering property, liability, workers compensation, and commercial auto.
      - name: Life Insurance Planning
        description: >-
          Offering term, universal, and whole life insurance products to help
          individuals and families plan for long-term financial security.
      - name: Farm and Agricultural Insurance
        description: >-
          Specialized farm insurance covering farmland, equipment, livestock,
          and agricultural operations for rural property owners.
  - type: Integrations
    data:
      - name: Independent Agent Systems
        description: >-
          Integration with agency management systems used by independent agents
          to manage policies, quotes, and client relationships.
      - name: ACORD Standards
        description: >-
          Adherence to ACORD data standards used in the insurance industry for
          data exchange between carriers, agencies, and industry partners.
